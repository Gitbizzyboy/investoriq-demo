<!DOCTYPE html>
<html>
<head>
    <title>Test Markers</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        #map { height: 500px; }
    </style>
</head>
<body>
    <h1>Test Map</h1>
    <div id="map"></div>
    
    <script>
        // Initialize map
        const map = L.map('map').setView([41.5094, -90.5787], 11);
        
        // Add tile layer
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);
        
        // Test different marker types
        console.log("Adding test markers...");
        
        // 1. Regular marker (works)
        L.marker([41.5094, -90.5787]).addTo(map).bindPopup("Regular marker");
        
        // 2. Simple circle marker
        L.circleMarker([41.52, -90.57], {
            radius: 10,
            fillColor: '#ff0000',
            color: '#000',
            weight: 2,
            opacity: 1,
            fillOpacity: 0.8
        }).addTo(map).bindPopup("Simple circle marker");
        
        // 3. Test with actual property coordinates
        $.get('/api/properties')
            .done(function(response) {
                const properties = response.properties || response;
                console.log(`Got ${properties.length} properties`);
                
                // Add first 5 properties as simple markers
                for (let i = 0; i < Math.min(5, properties.length); i++) {
                    const prop = properties[i];
                    if (prop.latitude && prop.longitude) {
                        console.log(`Adding property ${i+1}:`, prop.property_address);
                        
                        L.circleMarker([prop.latitude, prop.longitude], {
                            radius: 8,
                            fillColor: '#00ff00',
                            color: '#000',
                            weight: 1,
                            opacity: 1,
                            fillOpacity: 0.7
                        }).addTo(map).bindPopup(prop.property_address);
                    }
                }
            });
    </script>
</body>
</html>
